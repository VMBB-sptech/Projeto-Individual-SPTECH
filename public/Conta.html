<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="Validacoes.js"></script>
</head>

<body class="fundo">
    <!-- Header para facilitar a navegação -->
    <header class="cabecalho">

        <!-- Logo posicionada, oia que coisa linda -->
        <a href="index.html">
            <!-- linkando a imagem com o site principal -->
            <img src="assets/Imgs/LogoSite.png" alt="Logo sound space" class="logo">
        </a>

        <nav class="menu">
            <a href="Quiz.html" class="destaque-colorido navPadding">Quiz</a>
            <a href="AboutMe.html" class="destaque-colorido navPadding">Sobre Mim</a>
            <a href="LeaderBoard.html" class="destaque-colorido navPadding">Leaderboard's</a>
            <a class="login-button destaque-colorido" href="Conta.html">Conta</a>
        </nav>

    </header>

    <!-- Titulo da parada, pra ficar lindo -->
    <div class="titulo semi-conteudo">
        <h1 class="destaque-colorido" id="titulo_conta">Acesse sua conta</h1>
    </div>

    <!-- Div para formulários -->
    <div class="janela-form" style="text-align: center;">

        <!-- LOGIN -->
        <div id="div_login" style="display: block; width: 100%;">
            <br>

            <input class="input-padrao" type="text" id="input_email_login" placeholder="email"> <br><br>

            <input class="input-padrao" type="password" id="input_senha_login" placeholder="senha" onmouseover="mostrarSenhaLogin()" onmouseout="esconderSenhaLogin()">
            
            <br>

            <div style="display: flex; justify-content: space-between;margin-top: 10px; width: 80%; margin-left: auto; margin-right: auto; color: white;">

                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="checkbox_lembrar" style="font-size: 10px;"> manter logado
                </label>

                <!-- Vai fazer nada, ou vai? deixa quieto, vai fazer nada não -->
                <a href="EsqueciASenha.html" class="destaque-colorido fonte-padrao">esqueci a senha</a>
            </div>

            <br>

            <div id="div_mensagem" class="login-button largura-botao">

            </div>

            <br>

            <button class="login-button destaque-colorido largura-botao" onclick="loginUsuario()">Logar</button>

            <br><br>

            <span class="fonte-padrao" style="color: white;">ainda não tem conta?
                <a href="#" class="destaque-colorido" onclick="mudarParaCadastro()">cadastre-se</a>
            </span>

            <br><br>
        </div>

        <!-- CADASTRO -->
        <div id="div_cadastro" style="display: none; width: 100%;">

            <br>

            <input class="input-padrao" type="text" id="input_nome_cadastro" placeholder="nome"> <br><br>
            <input class="input-padrao" type="text" id="input_email_cadastro" placeholder="email"> <br><br>

            <div id="div_feedback_senha" class="fonte-padrao" style="display: none; font-size: 14px; margin-top: 5px; margin-bottom: 10px;"></div>

            <input class="input-padrao" type="password" id="input_senha_cadastro" placeholder="senha" onmouseover="mostrarSenhaCadastro()" onmouseout="esconderSenhaCadastro()" oninput="VerificarCadastro()">
            
            <br><br>

            <input class="input-padrao" type="password" id="input_senha_cadastro_confirmar" placeholder="confirme sua senha" onmouseover="mostrarSenhaConfirmar()" onmouseout="esconderSenhaConfirmar()">

            <br><br>

            <div id="div_mensagem_cadastro" class="login-button largura-botao" style="display: none; margin-left: auto; margin-right: auto; margin-bottom: 10px;"></div>
            
            <br>

            <button class="login-button destaque-colorido largura-botao" onclick="cadastrarUsuario()">Cadastrar</button>

            <br><br>

            <span class="fonte-padrao" style="color: white;">já tem uma conta?

                <a href="#" class="destaque-colorido" onclick="mudarParaLogin()">faça login</a>

            </span>

            <br><br>
        </div>
    </div>
</body>

</html>
